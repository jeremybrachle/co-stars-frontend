name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p \"require('./package.json').version\")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version v$TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          awk -v version="$TAG_VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Could not find CHANGELOG.md section for version $TAG_VERSION"
            exit 1
          fi

          {
            echo "release_name=Co-Stars v$TAG_VERSION"
            echo 'release_notes<<EOF'
            cat release-notes.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.changelog.outputs.release_name }}
          body: ${{ steps.changelog.outputs.release_notes }}
          generate_release_notes: false